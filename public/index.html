<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="generator" content="Hugo 0.158.0"><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=livereload" data-no-instant defer></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Megaport Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  
<header class="bg-white border-b border-gray-200 px-6 py-6">
  <div class="max-w-7xl px-6 md:px-16 mx-auto flex items-center justify-between gap-6 flex-wrap">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">The Megaport Blog</h1>
      <p class="text-sm text-gray-500 mt-0.5">Fetched fresh from the API</p>
    </div>
    <nav class="flex gap-6 text-sm text-gray-500">
      <a href="#posts" class="hover:text-blue-600 transition-colors">Posts</a>
      <a href="#contact" class="hover:text-blue-600 transition-colors">Contact</a>
    </nav>
  </div>
</header>


<section class="px-6 md:px-16 py-8 max-w-7xl mx-auto">
  <div class="relative max-w-md">
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
    </span>
    <input
      id="search-input"
      type="text"
      placeholder="Search by title..."
      class="w-full bg-white border border-gray-300 rounded-lg pl-9 pr-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
    />
  </div>
  <p id="results-count" class="mt-2 text-xs text-gray-400"></p>
</section>


<section id="posts" class="px-6 md:px-16 pb-20 max-w-7xl mx-auto">
  <div id="posts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  <div id="no-results" class="hidden text-center py-24 text-gray-400 text-lg">No posts found.</div>
  <div id="loading" class="text-center py-24 text-gray-400 text-sm animate-pulse">Loading posts...</div>
</section>


<section id="contact" class="border-t border-gray-200 px-6 md:px-16 py-20 bg-white">
  <div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold text-gray-900 mb-1">Contact Us</h2>
    <p class="text-sm text-gray-500 mb-8">We would love to hear from you.</p>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" id="contact-form" class="space-y-5">
      <input type="hidden" name="form-name" value="contact" />
      <p class="hidden"><label>Do not fill this out: <input name="bot-field" /></label></p>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input type="text" name="name" required placeholder="Jane Smith"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" name="email" required placeholder="jane@example.com"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
        <input type="text" name="subject" required placeholder="What is this about?"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
        <textarea name="message" required rows="5" placeholder="Your message here..."
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"></textarea>
      </div>
      <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
        Send Message
      </button>
      <div id="form-success" class="hidden text-green-600 text-sm pt-1">Message sent! We will be in touch soon.</div>
    </form>
  </div>
</section>


<footer class="border-t border-gray-200 px-6 md:px-16 py-6 text-center text-gray-400 text-xs">
  2026 The Blog - Powered by Hugo and Netlify
</footer>


<div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4 md:p-10">
  <article id="modal-box" class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto relative">
    <button id="modal-close" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors z-10 text-xl leading-none">x</button>
    <div class="p-8">
      <p id="modal-meta" class="text-xs text-gray-400 uppercase tracking-wider mb-3"></p>
      <h2 id="modal-title" class="text-2xl font-bold text-gray-900 mb-4 leading-snug"></h2>
      <hr class="border-gray-200 mb-5" />
      <p id="modal-body" class="text-gray-600 text-sm leading-relaxed"></p>
      <div class="mt-6 pt-6 border-t border-gray-100 flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-xs text-blue-600 font-bold" id="modal-avatar"></div>
        <p id="modal-author" class="text-xs text-gray-400 uppercase tracking-wider"></p>
      </div>
    </div>
  </article>
</div>


  <script src="/js/app.js"></script>
</body>
</html>
